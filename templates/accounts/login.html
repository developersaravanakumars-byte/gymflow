{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GymFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/gymflow.css' %}" rel="stylesheet">
  <style>
    body { background: #f8f9fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(127,119,221,0.10); padding: 40px 36px; width: 100%; max-width: 400px; }
    .login-brand { font-size: 28px; font-weight: 700; color: #7F77DD; margin-bottom: 4px; }
    .login-sub { color: #888; font-size: 14px; margin-bottom: 32px; }
    .btn-primary { background: #7F77DD; border-color: #7F77DD; }
    .btn-primary:hover { background: #6c64c9; border-color: #6c64c9; }
    .form-control:focus { border-color: #7F77DD; box-shadow: 0 0 0 0.2rem rgba(127,119,221,0.15); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand"><i class="bi bi-lightning-charge-fill me-2"></i>GymFlow</div>
    <div class="login-sub">Sign in to your account</div>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-500">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-500">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
  </div>
</body>
</html>
