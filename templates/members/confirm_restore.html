{% extends 'base.html' %}
{% block title %}Restore Member — GymFlow{% endblock %}
{% block content %}
<div class="page-header"><h1>Restore Member</h1></div>
<div class="form-card" style="max-width:480px">
  <p>Restore <strong>{{ member.full_name }}</strong> to active members?</p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-success">Yes, Restore</button>
      <a href="{% url 'members:archived' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
